<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacramento Patio Sun Map (Free)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

<style>
  body { margin:0; font-family: system-ui; }
  #map { height: 70vh; }
  #panel { padding:12px; }
  .row { padding:6px 0; border-bottom:1px solid #eee; }
</style>
</head>
<body>

<div id="map"></div>
<div id="panel">
  <button onclick="refreshScores()">Refresh Scores</button>
  <div id="list"></div>
</div>

<script>

const venues = [
  { name:"LowBrau", lat:38.5758075, lng:-121.4804924, facing:260, shade:0.25 },
  { name:"Biergarten", lat:38.573277, lng:-121.474756, facing:250, shade:0.15 },
  { name:"Karma Brew", lat:38.5717379, lng:-121.4881967, facing:240, shade:0.3 },
  { name:"Midtown Spirits", lat:38.575255, lng:-121.482607, facing:250, shade:0.45 },
  { name:"SacYard", lat:38.5642675, lng:-121.46562997, facing:255, shade:0.1 },
  { name:"Iron Horse Tavern", lat:38.5770, lng:-121.4817, facing:255, shade:0.25 }
];

const map = L.map('map').setView([38.575, -121.485], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];

function degDiff(a, b) {
  return Math.abs(((a - b + 540) % 360) - 180);
}

function scoreVenue(v) {
  const today = new Date();
  let total = 0;
  let samples = 0;

  for (let h = 15; h <= 19; h++) {
    const t = new Date(today.getFullYear(), today.getMonth(), today.getDate(), h);
    const pos = SunCalc.getPosition(t, v.lat, v.lng);

    const alt = pos.altitude * 180/Math.PI;
    if (alt <= 0) continue;

    let az = pos.azimuth * 180/Math.PI;
    az = (az + 180 + 360) % 360;

    const facingFactor = Math.max(0, 1 - degDiff(az, v.facing)/90);
    const shadeFactor = 1 - v.shade;

    total += facingFactor * shadeFactor;
    samples++;
  }

  return samples ? total/samples * 100 : 0;
}

function color(score){
  if(score > 60) return "red";
  if(score > 45) return "orange";
  if(score > 30) return "gold";
  return "green";
}

function refreshScores(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const scored = venues.map(v => ({
    ...v,
    score: scoreVenue(v)
  })).sort((a,b)=>b.score-a.score);

  const list = document.getElementById("list");
  list.innerHTML = "";

  scored.forEach((v,i)=>{
    const marker = L.circleMarker([v.lat,v.lng],{
      radius:10,
      color:color(v.score),
      fillOpacity:0.9
    }).addTo(map);

    marker.bindPopup(`<b>${v.name}</b><br>Score: ${v.score.toFixed(1)}`);

    markers.push(marker);

    list.innerHTML += `<div class="row">
      ${i+1}. <b>${v.name}</b> – ${v.score.toFixed(1)}
    </div>`;
  });
}

refreshScores();

</script>
</body>
</html>
