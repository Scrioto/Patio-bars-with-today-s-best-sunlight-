<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Sac Patio Sun Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

<style>
  :root{
    --bg:#0f1116;
    --panel:#141826;
    --panel2:#1b2033;
    --text:#f5f6fa;
    --muted:#c9cede;
    --accent:#ffb020;
    --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui}
  header{padding:14px 14px 8px;font-weight:900;font-size:18px;letter-spacing:.2px}
  #bestBanner{
    position:sticky; top:0; z-index:999;
    background:rgba(255,176,32,.92);
    color:#111; padding:12px 14px; text-align:left;
    font-weight:900;
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(0,0,0,.08);
  }
  #subBanner{
    background:rgba(255,255,255,.04);
    color:var(--muted);
    padding:10px 14px;
    font-weight:700;
    font-size:12px;
    border-bottom:1px solid var(--line);
  }
  #map{height:52vh}
  .tabs{display:flex; gap:8px; padding:10px 14px}
  .tab{
    flex:1; padding:10px 12px; text-align:center;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    color:var(--muted);
    font-weight:900;
    user-select:none;
  }
  .tab.active{
    background:rgba(255,176,32,.14);
    border-color:rgba(255,176,32,.35);
    color:var(--text);
  }
  .panel{padding:14px}
  .btnRow{display:flex; gap:10px; margin-bottom:12px}
  button{
    flex:1;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:linear-gradient(180deg, rgba(255,176,32,1), rgba(255,176,32,.85));
    color:#111;
    font-weight:1000;
  }
  button.secondary{
    background:rgba(255,255,255,.04);
    color:var(--muted);
    font-weight:900;
  }
  .list{
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    background:rgba(255,255,255,.02);
  }
  .item{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    gap:12px;
  }
  .item:last-child{border-bottom:none}
  .name{font-weight:1000}
  .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .scorePill{
    font-variant-numeric: tabular-nums;
    font-weight:1000;
    padding:5px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    align-self:flex-start;
    white-space:nowrap;
  }
  .forecastCard{
    background:rgba(255,255,255,.03);
    border:1px solid var(--line);
    padding:10px 12px;
    border-radius:16px;
    margin-bottom:10px;
  }
  .forecastTop{display:flex; justify-content:space-between; align-items:baseline; gap:10px}
  .forecastDay{font-weight:1000}
  .forecastDate{color:var(--muted); font-size:12px; margin-top:2px}
  .small{color:var(--muted); font-size:12px}
  /* dark attribution */
  .leaflet-control-attribution{background:rgba(0,0,0,.35)!important;color:#ddd!important;border-radius:10px;padding:2px 8px}
  .leaflet-container{background:#0b0d12}
  /* pulse for best marker */
  .bestPulse{
    animation:pulse 1.9s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.18)}
    100%{transform:scale(1)}
  }
</style>
</head>
<body>

<header>Sac Patio Sun Map ☀️</header>
<div id="bestBanner">Calculating best patio…</div>
<div id="subBanner">Default window: 12pm–6pm (local time) • Gradient scores + glow markers</div>

<div class="tabs">
  <div class="tab active" onclick="showToday()" id="todayTab">Today</div>
  <div class="tab" onclick="showForecast()" id="forecastTab">7‑Day</div>
</div>

<div id="map"></div>

<div class="panel" id="todayPanel">
  <div class="btnRow">
    <button onclick="refreshScores()">Refresh</button>
    <button class="secondary" onclick="centerOnMe()">Center on me</button>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="panel" id="forecastPanel" style="display:none">
  <div id="forecast"></div>
</div>

<script>
  // Time window: 12pm–6pm
  const START_HOUR = 12;
  const END_HOUR   = 18;

  // Facing degrees: N=0, E=90, S=180, W=270
  // Fieldwork coords from public listings (approx): 38.5741465, -121.4836090
  const venues = [
    { name:"LowBrau", address:"1050 20th St, Sacramento, CA 95811", lat:38.5758075, lng:-121.4804924, facing:90,  shade:0.25 },
    { name:"Biergarten", address:"2332 K St, Sacramento, CA 95816", lat:38.5732770, lng:-121.4747560, facing:0,   shade:0.15 },
    { name:"Karma Brew", address:"1530 16th St, Sacramento, CA 95814", lat:38.5717379, lng:-121.4881967, facing:90, shade:0.30 },
    { name:"Midtown Spirits", address:"1731 L St, Sacramento, CA 95811", lat:38.5752550, lng:-121.4826070, facing:270, shade:0.45 },
    { name:"SacYard", address:"1725 33rd St, Sacramento, CA 95816", lat:38.5642675, lng:-121.46562997, facing:270, shade:0.10 },
    { name:"Iron Horse Tavern", address:"1800 15th St, Sacramento, CA 95811", lat:38.5770000, lng:-121.4817000, facing:0, shade:0.25 },
    { name:"Kupros", address:"1517 21st St, Sacramento, CA 95811", lat:38.5715, lng:-121.4762, facing:270, shade:0.30 },
    { name:"Fieldwork Brewing Co.", address:"1805 Capitol Ave, Sacramento, CA 95811", lat:38.5741465, lng:-121.4836090, facing:180, shade:0.25 } // south-facing patio
  ];

  // --- Map (dark tiles for UI pop) ---
  const map = L.map('map', { zoomControl:false }).setView([38.575, -121.485], 13);
  L.control.zoom({ position:'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CARTO',
    maxZoom: 19
  }).addTo(map);

  let markerObjs = []; // {name, marker, score}

  function degDiff(a,b){ return Math.abs(((a - b + 540) % 360) - 180); }

  function scoreVenue(v, date){
    let total = 0, samples = 0;
    // hourly sampling across the window (fast + stable)
    for(let h=START_HOUR; h<=END_HOUR; h++){
      const t = new Date(date.getFullYear(), date.getMonth(), date.getDate(), h);
      const pos = SunCalc.getPosition(t, v.lat, v.lng);
      const alt = pos.altitude * 180/Math.PI;
      if(alt <= 0) continue;

      const az = (pos.azimuth * 180/Math.PI + 180 + 360) % 360;
      const facing = Math.max(0, 1 - degDiff(az, v.facing)/90);
      total += facing * (1 - v.shade);
      samples++;
    }
    return samples ? (total / samples) * 100 : 0;
  }

  // Smooth gradient color (0..100) -> HSL (cool->hot)
  function color(score){
    const clamped = Math.max(0, Math.min(100, score));
    const hue = 210 - (clamped * 1.8); // 210 (blue) down to ~30 (orange)
    return `hsl(${hue}, 90%, 58%)`;
  }

  // Soft glow color-matched
  function glowCSS(c){
    return `drop-shadow(0 0 10px ${c}) drop-shadow(0 0 5px rgba(255,255,255,.15))`;
  }

  function scoreClass(score){
    if(score >= 60) return "🔥";
    if(score >= 45) return "☀️";
    if(score >= 30) return "⛅️";
    return "🌥️";
  }

  function clearMarkers(){
    markerObjs.forEach(o => map.removeLayer(o.marker));
    markerObjs = [];
  }

  function refreshScores(){
    clearMarkers();

    const today = new Date();
    const scored = venues.map(v => ({...v, score: scoreVenue(v, today)}))
      .sort((a,b)=> b.score - a.score);

    // Banner
    const best = scored[0];
    document.getElementById('bestBanner').textContent =
      `Best patio right now: ${best.name} ${scoreClass(best.score)} (${best.score.toFixed(1)}) • Window ${formatHour(START_HOUR)}–${formatHour(END_HOUR)}`;

    // List
    const list = document.getElementById('list');
    list.innerHTML = "";

    scored.forEach((v, i) => {
      const c = color(v.score);
      const radius = 9 + (v.score / 22); // size by score
      const m = L.circleMarker([v.lat, v.lng], {
        radius,
        color: c,
        fillColor: c,
        fillOpacity: 0.92,
        weight: 2
      }).addTo(map);

      m.bindPopup(`<b>${v.name}</b><br>${v.address}<br><b>Score:</b> ${v.score.toFixed(1)}<br><b>Window:</b> ${formatHour(START_HOUR)}–${formatHour(END_HOUR)}`);

      // apply glow + pulse on #1
      const el = m.getElement();
      if(el){
        el.style.filter = glowCSS(c);
        if(i === 0) el.classList.add('bestPulse');
      } else {
        m.on('add', () => {
          const el2 = m.getElement();
          if(el2){
            el2.style.filter = glowCSS(c);
            if(i === 0) el2.classList.add('bestPulse');
          }
        });
      }

      markerObjs.push({ name: v.name, marker: m, score: v.score });

      // list item
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div class="name">${i+1}. ${v.name}</div>
          <div class="meta">${v.address}</div>
          <div class="meta">Facing: ${dirLabel(v.facing)} • Shade: ${v.shade}</div>
        </div>
        <div class="scorePill">${scoreClass(v.score)} ${v.score.toFixed(1)}</div>
      `;
      div.onclick = () => {
        map.setView([v.lat, v.lng], 16, { animate:true });
        m.openPopup();
        // quick emphasis animation: bump radius
        const old = radius;
        m.setRadius(old + 3);
        setTimeout(()=> m.setRadius(old), 320);
      };
      list.appendChild(div);
    });
  }

  function buildForecast(){
    const container = document.getElementById('forecast');
    container.innerHTML = "";
    const base = new Date();

    for(let i=0;i<7;i++){
      const d = new Date(base.getFullYear(), base.getMonth(), base.getDate()+i);
      const scored = venues.map(v => ({...v, score: scoreVenue(v, d)}))
        .sort((a,b)=> b.score - a.score);

      const top3 = scored.slice(0,3);
      const card = document.createElement('div');
      card.className = 'forecastCard';
      const dayName = d.toLocaleDateString(undefined, { weekday:'long' });
      const dayDate = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });

      card.innerHTML = `
        <div class="forecastTop">
          <div>
            <div class="forecastDay">${dayName}</div>
            <div class="forecastDate">${dayDate} • ${formatHour(START_HOUR)}–${formatHour(END_HOUR)}</div>
          </div>
          <div class="scorePill">${top3[0].score.toFixed(1)}</div>
        </div>
        <div class="small" style="margin-top:10px">
          🥇 <b>${top3[0].name}</b> ${scoreClass(top3[0].score)} (${top3[0].score.toFixed(1)})<br>
          🥈 ${top3[1].name} ${scoreClass(top3[1].score)} (${top3[1].score.toFixed(1)})<br>
          🥉 ${top3[2].name} ${scoreClass(top3[2].score)} (${top3[2].score.toFixed(1)})
        </div>
        <div class="small" style="margin-top:10px; color:#9aa3bb">
          Tap to jump map to winner
        </div>
      `;

      card.onclick = () => {
        showToday();
        // center on that day's winner location
        const w = top3[0];
        map.setView([w.lat, w.lng], 16, { animate:true });
        // update banner to that day (without changing "today" scores)
        document.getElementById('bestBanner').textContent =
          `Forecast winner (${dayName}): ${w.name} ${scoreClass(w.score)} (${w.score.toFixed(1)}) • Window ${formatHour(START_HOUR)}–${formatHour(END_HOUR)}`;
      };

      container.appendChild(card);
    }
  }

  function formatHour(h){
    const ampm = h >= 12 ? 'pm' : 'am';
    const hr = ((h + 11) % 12) + 1;
    return `${hr}${ampm}`;
  }

  function dirLabel(deg){
    if(deg === 0) return "N";
    if(deg === 90) return "E";
    if(deg === 180) return "S";
    if(deg === 270) return "W";
    return `${deg}°`;
  }

  function showToday(){
    document.getElementById('todayPanel').style.display = '';
    document.getElementById('forecastPanel').style.display = 'none';
    document.getElementById('todayTab').classList.add('active');
    document.getElementById('forecastTab').classList.remove('active');
    setTimeout(()=> map.invalidateSize(), 120);
  }

  function showForecast(){
    document.getElementById('todayPanel').style.display = 'none';
    document.getElementById('forecastPanel').style.display = '';
    document.getElementById('todayTab').classList.remove('active');
    document.getElementById('forecastTab').classList.add('active');
    buildForecast();
    setTimeout(()=> map.invalidateSize(), 120);
  }

  function centerOnMe(){
    if(!navigator.geolocation){
      document.getElementById('bestBanner').textContent = "GPS not available on this device.";
      return;
    }
    document.getElementById('bestBanner').textContent = "Locating…";
    navigator.geolocation.getCurrentPosition((pos)=>{
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 14, { animate:true });
      refreshScores();
    }, ()=>{
      document.getElementById('bestBanner').textContent = "Location denied. (Still works without it.)";
      refreshScores();
    }, { enableHighAccuracy:true, timeout:8000 });
  }

  // init
  refreshScores();
</script>
</body>
</html>
